[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino

upload_speed = 115200
monitor_speed = 115200

lib_ldf_mode = deep+
lib_deps =
    adafruit/Adafruit BNO055 @ ^1.6.3
    adafruit/Adafruit_VL53L0X @ ^1.2.4
    pololu/QTRSensors @ ^4.0.0
    SPI
    Wire
